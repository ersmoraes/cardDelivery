spring.application.name=carddelivery

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/carddelivery
spring.datasource.username=app
spring.datasource.password=app
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Messaging (RabbitMQ topology)
carddelivery.rabbitmq.exchange=cards.exchange
carddelivery.rabbitmq.dlx=cards.dlx
carddelivery.rabbitmq.queues.persist=delivery.evaluated.persist
carddelivery.rabbitmq.queues.s3=delivery.evaluated.s3
carddelivery.rabbitmq.queues.dlq=delivery.evaluated.dlq
carddelivery.rabbitmq.routing-keys.delivery-evaluated=delivery.evaluated

# AWS S3
aws.s3.region=us-east-1
aws.s3.access-key=local
aws.s3.secret-key=local
aws.s3.bucket=carddelivery-audit
aws.s3.endpoint=http://localhost:4566

# CEP API (apontando para WireMock local)
cep.api.url=http://localhost:8081

# Cache (Caffeine)
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=3600s

# Resilience4j - Circuit Breaker
resilience4j.circuitbreaker.instances.cepProvider.sliding-window-size=10
resilience4j.circuitbreaker.instances.cepProvider.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.cepProvider.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.cepProvider.permitted-number-of-calls-in-half-open-state=3

# Resilience4j - Retry
resilience4j.retry.instances.cepProvider.max-attempts=3
resilience4j.retry.instances.cepProvider.wait-duration=500ms

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
