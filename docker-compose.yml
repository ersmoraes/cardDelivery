services:
  postgres:
    image: postgres:15
    container_name: carddelivery-postgres
    environment:
      POSTGRES_DB: carddelivery
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d carddelivery"]
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
  postgres_data:
