services:
  postgres:
    image: postgres:15
    container_name: carddelivery-postgres
    environment:
      POSTGRES_DB: carddelivery
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d carddelivery"]
      interval: 5s
      timeout: 5s
      retries: 10
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: carddelivery-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
  wiremock:
    image: wiremock/wiremock:3.13.1
    container_name: carddelivery-wiremock
    volumes:
      - ./wiremock:/home/wiremock
    ports:
      - "8081:8080"
    command: [ "--global-response-templating", "--verbose" ]
volumes:
  postgres_data:
  rabbitmq_data: